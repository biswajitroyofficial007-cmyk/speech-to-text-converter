<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceNote - Multi-Language STT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans Bengali', 'Noto Sans Devanagari', sans-serif;
            background: linear-gradient(135deg, #eef2f3 0%, #8e9eab 100%);
            min-height: 100vh;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .wave-container {
            display: none;
            height: 40px;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .wave-bar {
            width: 4px;
            height: 10px;
            background: #3b82f6;
            border-radius: 4px;
            animation: wave 1.2s ease-in-out infinite;
        }

        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 10px; transform: scaleY(1); }
            50% { height: 35px; transform: scaleY(1.2); }
        }

        .listening .wave-container { display: flex; }

        .listening #mic-icon {
            color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        #output {
            transition: all 0.3s ease;
            min-height: 220px;
            font-family: inherit;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-morphism w-full max-w-2xl rounded-[2rem] p-8 md:p-12 text-center">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-left">
                <h1 class="text-3xl font-bold text-gray-800">VoiceNote</h1>
                <p class="text-sm text-gray-500">Multilingual Speech-to-Text</p>
            </div>

            <!-- Language Selector -->
            <div class="relative w-full md:w-48">
                <select id="lang-select" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2 text-sm font-medium text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                    <option value="en-US">English (US)</option>
                    <option value="hi-IN">Hindi (हिन्दी)</option>
                    <option value="bn-IN">Bengali (বাংলা)</option>
                </select>
            </div>
        </div>

        <!-- Waveform Animation -->
        <div id="status-container" class="mb-6 flex flex-col items-center h-16 justify-center">
            <div class="wave-container">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
            <span id="status-text" class="text-sm font-semibold text-gray-400 mt-2">Ready</span>
        </div>

        <!-- Text Output Area -->
        <div class="relative mb-8 group">
            <div id="output" class="w-full bg-white border-2 border-dashed border-gray-200 rounded-2xl p-6 text-left text-gray-700 leading-relaxed overflow-y-auto max-h-[350px] text-lg md:text-xl" placeholder="Your speech will appear here...">
                Click the microphone to start...
            </div>
            
            <!-- Tools -->
            <div class="absolute bottom-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button id="copy-btn" title="Copy Text" class="p-2.5 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-lg transition-all border border-gray-200 active:scale-90">
                    <i class="fas fa-copy"></i>
                </button>
                <button id="clear-btn" title="Clear All" class="p-2.5 bg-gray-50 hover:bg-red-50 text-gray-500 hover:text-red-500 rounded-lg transition-all border border-gray-200 active:scale-90">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>

        <!-- Mic Button -->
        <button id="main-toggle" class="relative group inline-flex items-center justify-center w-24 h-24 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-2xl shadow-blue-300 transition-all duration-300 transform active:scale-95">
            <i id="mic-icon" class="fas fa-microphone text-3xl"></i>
            <span class="absolute -bottom-8 text-xs font-bold text-blue-600 opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-widest">Tap to Speak</span>
        </button>
        
        <div class="mt-16 text-[10px] text-gray-400 uppercase tracking-widest">
            Browser Speech Engine • Local Processing
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900/90 backdrop-blur text-white px-8 py-3 rounded-2xl opacity-0 pointer-events-none transition-all duration-300 transform translate-y-4">
        Text copied to clipboard
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            document.getElementById('output').innerHTML = '<span class="text-red-500 font-bold">Incompatible Browser.</span><br><span class="text-sm">Please use Chrome or Edge for speech recognition.</span>';
            document.getElementById('main-toggle').style.display = 'none';
        } else {
            const recognition = new SpeechRecognition();
            const outputDiv = document.getElementById('output');
            const mainToggle = document.getElementById('main-toggle');
            const langSelect = document.getElementById('lang-select');
            const statusText = document.getElementById('status-text');
            const statusContainer = document.getElementById('status-container');
            const copyBtn = document.getElementById('copy-btn');
            const clearBtn = document.getElementById('clear-btn');
            
            let isListening = false;
            let finalTranscript = '';

            recognition.continuous = true;
            recognition.interimResults = true;

            const updateLanguage = () => {
                recognition.lang = langSelect.value;
                if (isListening) {
                    stopListening();
                    setTimeout(() => startListening(), 300);
                }
            };

            langSelect.addEventListener('change', updateLanguage);
            recognition.lang = langSelect.value;

            recognition.onstart = () => {
                isListening = true;
                statusContainer.classList.add('listening');
                statusText.innerText = "Listening (" + langSelect.options[langSelect.selectedIndex].text + ")...";
                statusText.className = "text-sm font-bold text-blue-600 mt-2";
                if(outputDiv.innerText.includes('Click the microphone')) {
                    outputDiv.innerText = '';
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                outputDiv.innerHTML = `
                    <span class="text-gray-900">${finalTranscript}</span>
                    <span class="text-blue-400 italic">${interimTranscript}</span>
                `;
                outputDiv.scrollTop = outputDiv.scrollHeight;
            };

            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') {
                    showToast("Microphone access denied.");
                }
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    recognition.start();
                } else {
                    stopListening();
                }
            };

            function startListening() {
                recognition.start();
                mainToggle.classList.replace('bg-blue-600', 'bg-red-500');
                mainToggle.classList.replace('shadow-blue-300', 'shadow-red-200');
            }

            function stopListening() {
                isListening = false;
                recognition.stop();
                statusContainer.classList.remove('listening');
                statusText.innerText = "Ready";
                statusText.className = "text-sm font-semibold text-gray-400 mt-2";
                mainToggle.classList.replace('bg-red-500', 'bg-blue-600');
                mainToggle.classList.replace('shadow-red-200', 'shadow-blue-300');
            }

            mainToggle.addEventListener('click', () => {
                if (isListening) stopListening();
                else startListening();
            });

            clearBtn.addEventListener('click', () => {
                finalTranscript = '';
                outputDiv.innerText = 'Click the microphone to start...';
            });

            copyBtn.addEventListener('click', () => {
                const text = outputDiv.innerText;
                if (!text || text.includes('Click the microphone')) return;
                
                // Using document.execCommand as per requirements for iframe compatibility
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("copy");
                document.body.removeChild(textArea);
                
                showToast("Copied to clipboard");
            });

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.innerText = msg;
                toast.classList.remove('opacity-0', 'translate-y-4');
                setTimeout(() => {
                    toast.classList.add('opacity-0', 'translate-y-4');
                }, 2000);
            }
        }
    </script>
</body>
</html>
